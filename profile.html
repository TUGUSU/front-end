<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile Management</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container profile-container">

<h2>Profile Management</h2>

<h3 class="section-title">Create User</h3>

<label for="createId">ID</label>
<input type="number" id="createId">

<label for="createName">Name</label>
<input type="text" id="createName">

<label for="createEmail">Email</label>
<input type="text" id="createEmail">

<label for="createBio">Bio</label>
<input type="text" id="createBio">

<label for="createPhone">Phone</label>
<input type="text" id="createPhone">

<button onclick="createUser()">Create User</button>

<hr>

<h3 class="section-title">Get User by ID</h3>

<label for="getUserId">User ID</label>
<input type="number" id="getUserId">

<button onclick="getUser()">Get User</button>

<hr>

<h3 class="section-title">Update User</h3>

<label for="updateId">User ID</label>
<input type="number" id="updateId">

<label for="updateName">Name</label>
<input type="text" id="updateName">

<label for="updateEmail">Email</label>
<input type="text" id="updateEmail">

<label for="updateBio">Bio</label>
<input type="text" id="updateBio">

<label for="updatePhone">Phone</label>
<input type="text" id="updatePhone">

<button onclick="updateUser()">Update User</button>

<hr>

<h3 class="section-title">Delete User</h3>

<label for="deleteId">User ID</label>
<input type="number" id="deleteId">

<button onclick="deleteUser()">Delete User</button>

<hr>

<span class="result-label">Result</span>
<div class="result-box">
<pre id="result">No result yet.</pre>
</div>

</div>

<script>
const BASE_URL = "http://localhost:8081/users";

function getToken() {
    return localStorage.getItem("token");
}

function headers() {
    return {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + getToken()
    };
}

function showResult(data) {
    try {
        if (typeof data === "string") {
            document.getElementById("result").innerText = data;
        } else {
            document.getElementById("result").innerText = JSON.stringify(data, null, 2);
        }
    } catch (e) {
        document.getElementById("result").innerText = data;
    }
}

async function createUser() {
    const user = {
        id: parseInt(document.getElementById("createId").value),
        name: document.getElementById("createName").value,
        email: document.getElementById("createEmail").value,
        bio: document.getElementById("createBio").value,
        phone: document.getElementById("createPhone").value
    };

    const response = await fetch(BASE_URL, {
        method: "POST",
        headers: headers(),
        body: JSON.stringify(user)
    });

    const text = await response.text();

    try {
        showResult(JSON.parse(text));
    } catch {
        showResult(text);
    }
}

async function getUser() {
    const id = document.getElementById("getUserId").value;

    const response = await fetch(BASE_URL + "/" + id, {
        method: "GET",
        headers: headers()
    });

    const text = await response.text();

    try {
        showResult(JSON.parse(text));
    } catch {
        showResult(text);
    }
}

async function updateUser() {
    const id = document.getElementById("updateId").value;

    const user = {
        id: parseInt(id),
        name: document.getElementById("updateName").value,
        email: document.getElementById("updateEmail").value,
        bio: document.getElementById("updateBio").value,
        phone: document.getElementById("updatePhone").value
    };

    const response = await fetch(BASE_URL + "/" + id, {
        method: "PUT",
        headers: headers(),
        body: JSON.stringify(user)
    });

    const text = await response.text();

    try {
        showResult(JSON.parse(text));
    } catch {
        showResult(text);
    }
}

async function deleteUser() {
    const id = document.getElementById("deleteId").value;

    const response = await fetch(BASE_URL + "/" + id, {
        method: "DELETE",
        headers: headers()
    });

    const text = await response.text();

    try {
        showResult(JSON.parse(text));
    } catch {
        showResult(text);
    }
}
</script>

</body>
</html>
